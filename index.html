<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaxy S24 Giveaway</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #f0f0f0, #ffffff);
      text-align: center;
      padding: 20px;
    }
    .container {
      background: white;
      max-width: 500px;
      margin: 50px auto;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h1 {
      color: #333;
    }
    .phone-img {
      width: 100%;
      max-width: 300px;
      border-radius: 8px;
    }
    .timer {
      font-size: 24px;
      color: #d9534f;
      margin: 20px 0;
    }
    .btn {
      background-color: #28a745;
      color: white;
      padding: 15px 30px;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      text-decoration: none;
    }
    .popup {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      padding: 10px 15px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Congratulations Michael Anderson!</h1>
    <p>You have been selected to claim a FREE Samsung Galaxy S24!</p>
    <img src="https://i.imgur.com/s9QeN6S.png" alt="Samsung Galaxy S24" class="phone-img">
    <p class="timer" id="countdown">Offer expires in 05:00</p>
    <a class="btn" href="#">Claim Now</a>
  </div>

  <div class="popup" id="popup">Sarah from New York just claimed a Galaxy S24!</div>

  <script>
    // Countdown Timer
    let timeLeft = 300;
    const countdown = document.getElementById('countdown');
    setInterval(() => {
      if (timeLeft <= 0) return;
      timeLeft--;
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;
      countdown.textContent = `Offer expires in ${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }, 1000);

    // Fake popup
    const popup = document.getElementById('popup');
    setInterval(() => {
      popup.style.display = 'block';
      setTimeout(() => {
        popup.style.display = 'none';
      }, 4000);
    }, 12000);
  </script>
</body>
</html>
